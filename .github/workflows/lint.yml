name: Code Linting & Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pylint
      run: |
        pylint app/ canteen_project/ --rcfile=.pylintrc --exit-zero

    - name: Run Black (Code Formatter Check)
      run: |
        black --check app/ canteen_project/ --line-length=100 || true

    - name: Run Flake8
      run: |
        flake8 app/ canteen_project/ --max-line-length=100 --exclude=migrations,venv

    - name: Run isort (Import Sorter Check)
      run: |
        isort --check-only app/ canteen_project/ || true

    - name: Upload Pylint Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: pylint-report-${{ matrix.python-version }}
        path: pylint-report.txt
