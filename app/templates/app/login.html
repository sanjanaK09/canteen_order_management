{% extends 'app/base.html' %}
{% block content %}

<div class="login-box">
    <h2>Login 📱</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="phone" placeholder="Enter Phone Number" required>
        <button type="submit" class="btn">Send OTP</button>
    </form>
</div>

{% endblock %}
