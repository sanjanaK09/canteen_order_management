{% extends 'app/base.html' %}
{% block content %}

<h2>Your Wishlist ❤️</h2>

<div class="wishlist-container">

{% for item in items %}
    <div class="wishlist-card">
        <h3>{{ item.item.name }}</h3>
        <p>₹{{ item.item.price }}</p>

        <a href="/add/{{item.item.id}}/" class="btn">Add to Cart</a>
    </div>
{% endfor %}

</div>

{% endblock %}
